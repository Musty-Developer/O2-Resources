<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | O2 Resources Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <h2>Secure Account Recovery</h2>
        <p>Please enter your new password below to secure your account.</p>

        <form id="dedicatedResetForm">
            <div class="form-group">
                <label for="recoveryPassword">New Password</label>
                <input type="password" id="recoveryPassword" placeholder="Minimum 6 characters" required minlength="6">
            </div>

            <div class="form-group">
                <label for="recoveryConfirmPassword">Confirm New Password</label>
                <input type="password" id="recoveryConfirmPassword" placeholder="Retype your new password" required minlength="6">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="showRecoveryPasswordCheckbox">
                <label for="showRecoveryPasswordCheckbox">Show passwords</label>
            </div>

            <button type="submit" class="btn btn-primary auth-btn-full">Lock In New Password</button>
        </form>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
