<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | O2 Resources Hub</title>
    <link rel="stylesheet" href="styles.css">
    <script async src="https://plausible.io/js/pa-JZNZHDtekMev1EpVUeX6L.js"></script>
    <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
    </script>
</head>
<body class="auth-page">

    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p>Pick up exactly where you left off.</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="loginPassword" style="display: flex; justify-content: space-between; align-items: center;">
                    Password
                    <a href="#" id="forgotPasswordLink" style="color: var(--text-main); font-size: 0.85rem; font-weight: 500; text-decoration: none;">Forgot Password?</a>
                </label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>

            <div class="checkbox-group" style="margin-top: -0.5rem; margin-bottom: 1.5rem;">
                <input type="checkbox" id="showLoginPasswordCheckbox">
                <label for="showLoginPasswordCheckbox">Show Password</label>
            </div>

            <button type="submit" class="btn btn-primary auth-btn-full">Log In</button>
            <!-- OAUTH DIVIDER & GOOGLE BUTTON -->
<div class="auth-divider">
    <span>or continue with</span>
</div>

<button type="button" class="btn-oauth google-auth-btn">
    <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.7 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Sign in with Google
</button>
        </form>

        <div class="auth-links">
            Don't have an account? <a href="signup.html">Create one for free</a>
        </div>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
