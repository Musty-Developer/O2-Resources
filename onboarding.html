<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Up Your Syllabuses | O2 Resources Hub</title>
    <link rel="stylesheet" href="styles.css">
        <!-- Privacy-friendly analytics by Plausible -->
<script async src="https://plausible.io/js/pa-JZNZHDtekMev1EpVUeX6L.js"></script>
<script>
  window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
  plausible.init()
</script>
</head>
<body class="auth-page">

    <div id="global-loader" class="global-loader">
        <div class="spinner"></div>
    </div>

    <div class="onboarding-shell" x-data="onboardingFlow" x-init="init()">
        <div class="onboarding-card">
            
            <div class="onboarding-header">
                <span class="badge">Step 1 of 1</span>
                <h2>Tell us what you're sitting for</h2>
                <p>Select your exam series first, then choose the syllabuses you're appearing for in that series. You can add multiple series, but each syllabus can only belong to one series.</p>
            </div>

            <div class="exam-plan-editor">
                
                <div class="form-group">
                    <label for="onboarding-series">Exam series</label>
                    <select id="onboarding-series" class="filter-select exam-series-select" x-model="activeSeriesId">
                        <template x-for="series in examSeries" :key="series.id">
                            <option :value="series.id" x-text="series.label"></option>
                        </template>
                    </select>
                </div>

                <div class="subject-picker-compact">
                    <label class="subject-picker-label" style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; color: var(--text-muted);">
                        Add Syllabuses for <span x-text="seriesLabel(activeSeriesId)" style="color: var(--text-main); font-weight: 600;"></span>
                    </label>
                    <div class="dropdown-wrapper">
                        <select class="filter-select compact-selector" 
                                @change="let selectedId = $event.target.value; if(selectedId) { toggleSubject(selectedId); $event.target.value = ''; }">
                            <option value="" selected disabled>Choose a subject to add...</option>
                            <template x-for="subject in syllabuses" :key="subject.id">
                                <option :value="subject.id" 
                                        x-text="subject.label + (isSubjectDisabled(subject.id) ? ' (' + assignedElsewhereLabel(subject.id) + ')' : '')"
                                        :disabled="isSubjectDisabled(subject.id) || isSubjectSelected(subject.id)">
                                </option>
                            </template>
                        </select>
                    </div>
                </div>

                <div class="active-series-tags-container" x-show="isSubjectSelectedForActiveSeries()" style="display: none;">
                    <p class="subject-picker-label" style="margin-bottom: 12px; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);">Active Series Syllabuses</p>
                    <div class="subject-chip-list">
                        <template x-for="plan in examPlans.filter(p => p.seriesId === activeSeriesId)" :key="plan.seriesId">
                            <template x-for="subjectId in plan.subjectIds" :key="subjectId">
                                <span class="subject-chip status-pill-active">
                                    <span x-text="syllabusLabel(subjectId)"></span>
                                    <button type="button" class="chip-remove" @click="removeSubject(activeSeriesId, subjectId)" aria-label="Remove syllabus">&times;</button>
                                </span>
                            </template>
                        </template>
                    </div>
                </div>

                <hr class="layout-divider" x-show="configuredPlansList.length > 0" style="display: none;" />

                <div class="configured-plans" x-show="configuredPlansList.length > 0" style="display: none;">
                    <p class="configured-plans-label">Your Complete Exam Roadmap</p>
                    <template x-for="plan in configuredPlansList" :key="plan.seriesId">
                        <div class="configured-plan-row">
                            <div class="configured-plan-meta">
                                <strong x-text="seriesLabel(plan.seriesId)"></strong>
                                <div class="subject-chip-list">
                                    <template x-for="subjectId in plan.subjectIds" :key="subjectId">
                                        <span class="subject-chip">
                                            <span x-text="syllabusLabel(subjectId)"></span>
                                            <button type="button" class="chip-remove" @click="removeSubject(plan.seriesId, subjectId)" aria-label="Remove syllabus">&times;</button>
                                        </span>
                                    </template>
                                </div>
                            </div>
                            <button type="button" class="btn btn-secondary btn-compact" @click="clearSeries(plan.seriesId)">Clear series</button>
                        </div>
                    </template>
                </div>
            </div>

            <div class="action-footer">
                <button type="button" class="btn btn-primary auth-btn-full" :disabled="!canSave() || saving" @click="finishOnboarding()">
                    <span x-text="saving ? 'Saving...' : 'Save & Continue to Dashboard'"></span>
                </button>
            </div>

        </div>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
